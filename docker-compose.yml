services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: slim_php
    volumes:
      - .:/var/www/html
    networks:
      - slim
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: slim_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - slim
    depends_on:
      - php

  db:
    image: mariadb:11
    container_name: slim_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: slim
      MYSQL_USER: slim
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - slim

  redis:
    image: redis:7-alpine
    container_name: slim_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - slim

networks:
  slim:

volumes:
  db_data:
  redis_data:
